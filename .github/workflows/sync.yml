name: Sync active season to Supabase

# Refreshes the season marked is_active=true in Supabase from the live ESPN API.
# Weekly for now; before the 2026 NFL season starts, change the cron to daily
# (see the commented line below).
on:
  schedule:
    - cron: "0 12 * * 2" # Weekly: Tuesdays 12:00 UTC (after Monday Night Football)
    # - cron: "0 12 * * *" # Daily 12:00 UTC — switch to this for the 2026 season
  workflow_dispatch: {} # allow manual runs from the Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Update active season
        run: python supabase/update_season.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ESPN_LEAGUE_ID: ${{ secrets.ESPN_LEAGUE_ID }}
          ESPN_S2: ${{ secrets.ESPN_S2 }}
          ESPN_SWID: ${{ secrets.ESPN_SWID }}
